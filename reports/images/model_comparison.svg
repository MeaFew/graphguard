<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">GraphGuard fair model comparison</title>
  <desc id="desc">GraphSAGE reaches test ROC-AUC 0.793 and AP 0.062, outperforming the strongest tabular baseline MLP at ROC-AUC 0.727 and AP 0.047.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a16"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <style>
      text { font-family: Inter, "Microsoft YaHei", system-ui, sans-serif; fill: #f8fafc; }
      .muted { fill: #94a3b8; }
      .small { font-size: 16px; }
      .label { font-size: 20px; font-weight: 600; }
      .value { font-size: 27px; font-weight: 700; }
    </style>
  </defs>
  <rect width="1200" height="600" rx="28" fill="url(#bg)"/>
  <text x="60" y="66" font-size="34" font-weight="700">Does graph structure really beat tabular features?</text>
  <text x="60" y="100" class="muted small">Same temporal split · train-only scaling · causal subgraphs · test timestep 43–49</text>

  <rect x="60" y="136" width="730" height="388" rx="22" fill="#0f172a" fill-opacity=".62" stroke="#134e4a"/>
  <text x="92" y="178" class="label">Test ROC-AUC</text>
  <line x1="250" y1="196" x2="250" y2="478" stroke="#334155"/>
  <line x1="250" y1="478" x2="742" y2="478" stroke="#334155"/>
  <g class="small muted">
    <text x="245" y="504" text-anchor="middle">0.65</text>
    <text x="409" y="504" text-anchor="middle">0.70</text>
    <text x="573" y="504" text-anchor="middle">0.75</text>
    <text x="737" y="504" text-anchor="middle">0.80</text>
  </g>
  <g>
    <text x="92" y="233" class="label">GraphSAGE</text>
    <rect x="250" y="211" width="469" height="31" rx="8" fill="#22c55e"/>
    <text x="733" y="235" class="value">0.793</text>
    <text x="92" y="283" class="label">MLP</text>
    <rect x="250" y="261" width="253" height="31" rx="8" fill="#f59e0b"/>
    <text x="517" y="285" class="value">0.727</text>
    <text x="92" y="333" class="label">GCN</text>
    <rect x="250" y="311" width="223" height="31" rx="8" fill="#14b8a6"/>
    <text x="487" y="335" class="value">0.718</text>
    <text x="92" y="383" class="label">GAT</text>
    <rect x="250" y="361" width="220" height="31" rx="8" fill="#14b8a6"/>
    <text x="484" y="385" class="value">0.717</text>
    <text x="92" y="433" class="label">GIN</text>
    <rect x="250" y="411" width="187" height="31" rx="8" fill="#14b8a6"/>
    <text x="451" y="435" class="value">0.707</text>
  </g>

  <g>
    <rect x="830" y="136" width="310" height="120" rx="20" fill="#134e4a"/>
    <text x="862" y="177" class="small" fill="#ccfbf1">GraphSAGE test AP</text>
    <text x="862" y="224" font-size="42" font-weight="700">0.062</text>

    <rect x="830" y="276" width="310" height="120" rx="20" fill="#1e293b"/>
    <text x="862" y="317" class="small muted">Strongest tabular AP · MLP</text>
    <text x="862" y="364" font-size="42" font-weight="700">0.047</text>

    <rect x="830" y="416" width="310" height="108" rx="20" fill="#14532d"/>
    <text x="862" y="455" class="small">Illicit neighbors in explanations</text>
    <text x="862" y="497" class="value">~24% · 12× prior</text>
  </g>
  <text x="60" y="566" class="small muted">ROC-AUC alone is not enough: AP is reported because illicit transactions are only ~2.2% of all nodes.</text>
</svg>
