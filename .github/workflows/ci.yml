name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/ dashboard/
      - run: ruff format --check src/ tests/ dashboard/

  test:
    # Installs CPU-only torch + torch-geometric (PyG 2.3+ makes scatter/sparse
    # optional), materializes a synthetic graph, and runs pytest + coverage.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-cpu-torch-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-cpu-torch-
      - name: Install CPU torch + torch-geometric
        run: |
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric>=2.4.0 numpy pandas scikit-learn
      - run: pip install -e ".[dev]"
      - name: Materialize graph from synthetic fallback
        run: |
          python -m graphguard.download_data
          python -m graphguard.build_graph
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=graphguard --cov-report=term-missing --cov-fail-under=30

  typecheck:
    # Gradual typing: mypy reports but does not block CI yet.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy
      - run: mypy src/graphguard || true
